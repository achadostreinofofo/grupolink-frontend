name: CD — Deploy Frontend

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to AWS Amplify
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: https://redirectgrupo.com.br
          NODE_OPTIONS: --max-old-space-size=4096
        run: npm run build

      - name: Configure AWS credentials
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    us-east-1
        run: |
          echo "AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID"         >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY" >> "$GITHUB_ENV"
          echo "AWS_DEFAULT_REGION=$AWS_DEFAULT_REGION"       >> "$GITHUB_ENV"

      - name: Fix Amplify platform and redirect rules
        run: |
          APP_ID="${{ secrets.AMPLIFY_APP_ID }}"
          aws amplify update-app \
            --app-id "$APP_ID" \
            --platform WEB_COMPUTE \
            --region us-east-1 \
            --custom-rules '[]' || true

      - name: Trigger Amplify deployment (master branch)
        run: |
          APP_ID="${{ secrets.AMPLIFY_APP_ID }}"
          BRANCH="master"

          # Pega apenas o primeiro job ID numérico (--output text pode retornar "ID\nNone")
          RUNNING=$(aws amplify list-jobs \
            --app-id "$APP_ID" --branch-name "$BRANCH" \
            --query "jobSummaries[?status=='RUNNING' || status=='PENDING'].jobId | [0]" \
            --output text | grep -E '^[0-9]+$' || true)

          if [ -n "$RUNNING" ]; then
            echo "Canceling in-progress job: $RUNNING"
            aws amplify stop-job --app-id "$APP_ID" --branch-name "$BRANCH" --job-id "$RUNNING" || true

            # Aguarda o job parar antes de iniciar novo (Amplify permite apenas 1 job por branch)
            for i in $(seq 1 12); do
              sleep 5
              STATUS=$(aws amplify get-job \
                --app-id "$APP_ID" --branch-name "$BRANCH" --job-id "$RUNNING" \
                --query "job.summary.status" --output text 2>/dev/null || echo "DONE")
              echo "Job $RUNNING status: $STATUS"
              if [[ "$STATUS" != "RUNNING" && "$STATUS" != "PENDING" && "$STATUS" != "CANCELLING" ]]; then
                break
              fi
            done
          fi

          JOB_ID=$(aws amplify start-job \
            --app-id "$APP_ID" \
            --branch-name "$BRANCH" \
            --job-type RELEASE \
            --query "jobSummary.jobId" --output text)
          echo "Amplify job started: $JOB_ID"
          echo "Track: https://us-east-1.console.aws.amazon.com/amplify/home#/$APP_ID/$BRANCH"
