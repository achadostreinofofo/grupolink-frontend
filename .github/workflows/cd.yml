name: CD — Deploy Frontend

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to AWS Amplify
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: https://redirectgrupo.com.br
          NODE_OPTIONS: --max-old-space-size=4096
        run: npm run build

      - name: Configure AWS credentials
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    us-east-1
        run: |
          echo "AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID"         >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY" >> "$GITHUB_ENV"
          echo "AWS_DEFAULT_REGION=$AWS_DEFAULT_REGION"       >> "$GITHUB_ENV"

      - name: Trigger Amplify deployment (master branch)
        run: |
          JOB_ID=$(aws amplify start-job \
            --app-id ${{ secrets.AMPLIFY_APP_ID }} \
            --branch-name master \
            --job-type RELEASE \
            --query "jobSummary.jobId" --output text)
          echo "Amplify job started: $JOB_ID"
          echo "Track: https://us-east-1.console.aws.amazon.com/amplify/home#/${{ secrets.AMPLIFY_APP_ID }}/master"
